<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Bit Ton — Mint</title>

    <script src="https://unpkg.com/@tonconnect/ui@2.0.0/dist/tonconnect-ui.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--tg-theme-bg-color, #0b0f1a);
            color: var(--tg-theme-text-color, #fff);
            padding: 1rem;
        }

        .mint-card {
            width: 100%;
            max-width: 400px;
            border-radius: 32px;
            background: rgba(255,255,255,0.04);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255,255,255,0.07);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6), 0 0 80px rgba(0,212,255,0.15);
            position: relative;
            overflow: hidden;
        }

        .mint-card::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: inherit;
            background: linear-gradient(135deg, #00d4ff, #7b2ff7, #ff007a, #00d4ff);
            background-size: 400% 400%;
            animation: gradientShift 8s ease infinite;
            z-index: -1;
            opacity: 0.6;
            filter: blur(8px);
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .card-content {
            padding: 2rem 1.5rem 1.5rem;
            position: relative;
            z-index: 2;
        }

        .collection-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.8rem;
        }

        .collection-avatar {
            width: 60px;
            height: 60px;
            border-radius: 20px;
            background: linear-gradient(135deg, #7b2ff7, #00d4ff);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 20px rgba(123,47,247,0.3);
            overflow: hidden;
        }

        .collection-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .collection-name {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .nft-preview {
            width: 100%;
            aspect-ratio: 1/1;
            border-radius: 24px;
            overflow: hidden;
            margin-bottom: 1.5rem;
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
            background: linear-gradient(145deg, #1a1d2e, #10131f);
        }

        .nft-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
        }

        .nft-preview:hover img {
            transform: scale(1.05);
        }

        .price-container {
            display: flex;
            align-items: baseline;
            gap: 0.4rem;
            margin-bottom: 2rem;
        }

        .price {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #e0e0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .price-ton-symbol {
            font-size: 1rem;
            font-weight: 600;
            color: #00d4ff;
        }

        ton-connect-button {
            --tonconnect-button-background: rgba(255,255,255,0.08);
            --tonconnect-button-background-hover: rgba(255,255,255,0.12);
            width: 100%;
            display: block;
            margin-bottom: 1.5rem;
        }

        .mint-button {
            width: 100%;
            padding: 1rem;
            border: none;
            border-radius: 16px;
            font-size: 1.15rem;
            font-weight: 700;
            background: linear-gradient(135deg, #00d4ff, #7b2ff7);
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 24px rgba(0,212,255,0.35);
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .mint-button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(0,212,255,0.5);
        }

        .mint-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            box-shadow: none;
        }

        .error-message { color: #ff4d6a; font-size: 0.9rem; margin-top: 0.8rem; text-align: center; }
        .success-message { color: #4dffb5; font-size: 0.9rem; margin-top: 0.8rem; text-align: center; }

        .loading-spinner {
            display: inline-block; width: 18px; height: 18px;
            border: 2px solid rgba(255,255,255,0.3); border-top-color: white;
            border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="mint-card">
        <div class="card-content">
            <!-- Collection header with embedded Bit Ton logo -->
            <div class="collection-header">
                <div class="collection-avatar">
                    <!-- Inline SVG: Bit Ton logo -->
                    <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' style='stop-color:%2300d4ff'/%3E%3Cstop offset='100%25' style='stop-color:%237b2ff7'/%3E%3C/linearGradient%3E%3C/defs%3E%3Ccircle cx='50' cy='50' r='48' fill='url(%23g)'/%3E%3Ctext x='50' y='68' font-size='36' font-weight='bold' fill='white' text-anchor='middle' font-family='Arial, sans-serif'%3EBT%3C/text%3E%3C/svg%3E" alt="Bit Ton Logo">
                </div>
                <div class="collection-name">Bit Ton</div>
            </div>

            <!-- NFT preview with embedded artwork -->
            <div class="nft-preview">
                <!-- Inline SVG: abstract Bit Ton NFT preview -->
                <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 400 400'%3E%3Cdefs%3E%3ClinearGradient id='grad' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' style='stop-color:%23101a3a'/%3E%3Cstop offset='100%25' style='stop-color:%230b0f1a'/%3E%3C/linearGradient%3E%3ClinearGradient id='shine' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' style='stop-color:%2300d4ff'/%3E%3Cstop offset='100%25' style='stop-color:%237b2ff7'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='400' height='400' fill='url(%23grad)'/%3E%3Cpolygon points='200,50 300,150 280,280 120,280 100,150' fill='none' stroke='url(%23shine)' stroke-width='8'/%3E%3Cpolygon points='200,80 280,160 265,265 135,265 120,160' fill='rgba(0,212,255,0.15)'/%3E%3Ccircle cx='200' cy='200' r='50' fill='url(%23shine)' opacity='0.3'/%3E%3Ctext x='200' y='310' font-size='28' font-weight='bold' fill='white' text-anchor='middle' font-family='Arial, sans-serif' opacity='0.9'%3EBIT TON%3C/text%3E%3Ctext x='200' y='350' font-size='18' fill='%2300d4ff' text-anchor='middle' font-family='Arial, sans-serif'%3ENFT COLLECTION%3C/text%3E%3C/svg%3E" alt="Bit Ton NFT Preview">
            </div>

            <div class="price-container">
                <span class="price">0.333</span>
                <span class="price-ton-symbol">TON</span>
            </div>

            <ton-connect-button id="tonConnectButton"></ton-connect-button>

            <button class="mint-button" id="mintButton" disabled>
                <span id="mintButtonText">Connect Wallet to Mint</span>
            </button>
            <div id="messageArea"></div>
        </div>
    </div>

    <script>
        const CONFIG = {
            ownerAddress: 'UQCWSP13Du7_e9NMqimuRERQcjTxXNRgqVqlvnpU4QwX3QNh',
            mintPrice: 0.333,
            network: 'mainnet',
            commentPayload: '000000004d696e743a2042697420546f6e' // "Mint: Bit Ton"
        };

        const WebApp = window.Telegram?.WebApp;
        if (WebApp) { WebApp.ready(); WebApp.expand(); }

        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://YOUR_VERCEL_DOMAIN.vercel.app/tonconnect-manifest.json', // ← update
            buttonRootId: 'tonConnectButton',
            actionsConfiguration: {
                twaReturnUrl: 'https://t.me/YOUR_BOT_USERNAME/YOUR_APP_NAME' // ← update
            }
        });

        const mintButton = document.getElementById('mintButton');
        const mintButtonText = document.getElementById('mintButtonText');
        const messageArea = document.getElementById('messageArea');
        let isTransactionPending = false;

        tonConnectUI.onStatusChange(wallet => {
            if (wallet) {
                mintButton.disabled = false;
                mintButtonText.textContent = 'Mint Now';
                showMessage('', '');
            } else {
                mintButton.disabled = true;
                mintButtonText.textContent = 'Connect Wallet to Mint';
                showMessage('', '');
            }
        });

        if (tonConnectUI.connected) {
            mintButton.disabled = false;
            mintButtonText.textContent = 'Mint Now';
        }

        mintButton.addEventListener('click', async () => {
            if (isTransactionPending) return;
            if (!tonConnectUI.connected) { tonConnectUI.openModal(); return; }

            isTransactionPending = true;
            mintButton.disabled = true;
            mintButtonText.innerHTML = '<span class="loading-spinner"></span> Confirm in wallet...';
            showMessage('', '');

            try {
                await tonConnectUI.sendTransaction({
                    validUntil: Math.floor(Date.now() / 1000) + 300,
                    network: CONFIG.network,
                    messages: [{
                        address: CONFIG.ownerAddress,
                        amount: (CONFIG.mintPrice * 1e9).toString(),
                        payload: CONFIG.commentPayload
                    }]
                });
                showMessage('success', '🎉 Welcome to Bit Ton! Your mint is confirmed.');
                mintButtonText.textContent = 'Mint Another';
            } catch (error) {
                showMessage('error', error.message || 'Transaction cancelled.');
                mintButton.disabled = false;
                mintButtonText.textContent = 'Mint Now';
            } finally {
                isTransactionPending = false;
                if (mintButtonText.innerHTML.includes('spinner')) {
                    mintButton.disabled = false;
                    mintButtonText.textContent = 'Mint Now';
                }
            }
        });

        function showMessage(type, text) {
            const cls = type === 'success' ? 'success-message' : 'error-message';
            messageArea.innerHTML = `<div class="${cls}">${text}</div>`;
        }

        if (WebApp) {
            const apply = () => {
                document.documentElement.style.setProperty('--tg-theme-bg-color', WebApp.themeParams.bg_color || '#0b0f1a');
                document.documentElement.style.setProperty('--tg-theme-text-color', WebApp.themeParams.text_color || '#ffffff');
            };
            WebApp.onEvent('themeChanged', apply);
            apply();
        }
    </script>
</body>
</html>
